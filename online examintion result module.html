<!DOCTYPE html>
<html>
<head>
<title>Online Examination Result Generation</title>
<style>
body{
    font-family: Arial;
    background-color:#f2f2f2;
}
.container{
    width:400px;
    margin:auto;
    margin-top:50px;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}
h2{
    text-align:center;
}
input{
    width:100%;
    padding:8px;
    margin:5px 0;
}
button{
    width:100%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}
.result{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Online Examination Result</h2>

<label>Student Name</label>
<input type="text" id="name">

<label>Math Marks</label>
<input type="number" id="m1">

<label>Science Marks</label>
<input type="number" id="m2">

<label>English Marks</label>
<input type="number" id="m3">

<button onclick="calculateResult()">Generate Result</button>

<div class="result" id="output"></div>

</div>

<script>
function calculateResult(){

let name=document.getElementById("name").value;
let m1=parseInt(document.getElementById("m1").value);
let m2=parseInt(document.getElementById("m2").value);
let m3=parseInt(document.getElementById("m3").value);

let total=m1+m2+m3;
let percentage=total/3;

let result="Pass";

if(m1<35 || m2<35 || m3<35){
    result="Fail";
}

document.getElementById("output").innerHTML=
"Student Name: "+name+"<br>"+
"Total Marks: "+total+"<br>"+
"Percentage: "+percentage.toFixed(2)+"%<br>"+
"Result: "+result;

}
</script>

</body>
</html>
